<!doctype html>
<html lang="pt-BR">
<head>
    <link rel="manifest" id="manifest-placeholder">
    <meta name="theme-color" content="#0f172a">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tributos & Cálculos Premium</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-maskmoney/3.0.2/jquery.maskMoney.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #38bdf8;
            --bg-deep: #0f172a;
            --bg-light: #1e293b;
            --card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #fb7185;
            --success: #22c55e;
            --glow: rgba(56, 189, 248, 0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, var(--bg-light), var(--bg-deep));
            color: var(--text-main);
            display: flex; justify-content: center;
            overflow-x: hidden;
        }

        #overlay-verse {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; visibility: hidden; opacity: 0;
            transition: 0.4s ease;
        }
        #overlay-verse.show { visibility: visible; opacity: 1; }

        .popup-card {
            background: var(--primary); color: var(--bg-deep);
            width: 85%; max-width: 380px; padding: 40px 25px;
            border-radius: 32px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: scale(0.8); transition: 0.4s;
        }
        #overlay-verse.show .popup-card { transform: scale(1); }

        .popup-text { font-size: 1.3rem; font-weight: 800; margin-bottom: 30px; }

        .btn-amem {
            background: var(--bg-deep); color: white; border: none;
            padding: 18px; border-radius: 20px;
            font-weight: 800; font-size: 1.1rem; cursor: pointer;
            width: 100%;
        }

        .container {
            width: 100%; max-width: 480px; padding: 20px;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        .tabs {
            display: flex; background: rgba(0,0,0,0.3);
            border-radius: 16px; padding: 5px; margin: 40px 0 25px;
        }

        .tab-btn {
            flex: 1; padding: 14px; border: none; background: transparent;
            color: var(--text-dim); font-weight: 600; cursor: pointer;
            border-radius: 12px;
        }

        .tab-btn.active {
            background: var(--primary); color: var(--bg-deep);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .glass-card {
            background: var(--card);
            border-radius: 32px; padding: 25px;
        }

        /* AJUSTE DO TÍTULO */
        .label-sm {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        #valor_salario {
            width: 100%;
            padding: 18px;
            font-size: 2rem;
            border-radius: 20px;
            text-align: center;
        }

        .total-display {
            background: linear-gradient(135deg, #0284c7, #2563eb);
            border-radius: 24px; padding: 20px; margin: 20px 0;
            text-align: center;
        }

        #total_val { font-size: 2.5rem; font-weight: 800; }

        .result-card {
            display: flex; justify-content: space-between;
            padding: 15px;
            margin-bottom: 8px;
        }

        /* NOVO RODAPÉ */
        .footer { margin-top: auto; padding: 40px 0 20px; }

        .creator-info { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 6px;
        }

        .created-label { 
            font-size: 0.75rem; 
            font-weight: 600; 
            color: var(--text-dim); 
            letter-spacing: 2px;
        }

        .creator-main {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .creator-name { 
            color: white; 
            font-weight: 800; 
            font-size: 1.1rem;
        }

        .creator-year {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .icon-coin { 
            width: 28px; 
            height: 28px; 
            background: var(--primary); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--bg-deep); 
            font-weight: 800; 
        }
    </style>
</head>

<body>

<div class="container">

    <div class="tabs">
        <button class="tab-btn active">Tributos</button>
        <button class="tab-btn">Calculadora</button>
    </div>

    <div class="glass-card">
        <span class="label-sm">VALOR A CALCULAR</span>
        <input type="text" id="valor_salario" placeholder="Digite o seu valor aqui">

        <div class="total-display">
            <span id="total_val">R$ 0,00</span>
        </div>
    </div>

    <div class="footer">
        <div class="creator-info">
            <span class="created-label">CREATED BY</span>

            <div class="creator-main">
                <div class="icon-coin">$</div>
                <span class="creator-name">JADSON VIANA</span>
            </div>

            <span class="creator-year">2026</span>
        </div>
    </div>

</div>

</body>
</html>
