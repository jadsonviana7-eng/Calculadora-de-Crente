<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tributos & Cálculos Premium</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" id="manifest-placeholder">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-maskmoney/3.0.2/jquery.maskMoney.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.8);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #fb7185;
            --success: #22c55e;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .container {
            width: 100%; max-width: 480px; margin: 0 auto;
            padding: 20px; box-sizing: border-box; position: relative;
        }

        /* Botão Sair */
        .exit-app-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(251, 113, 133, 0.1); border: 1px solid var(--danger);
            color: var(--danger); border-radius: 8px; padding: 5px 12px;
            font-size: 0.7rem; font-weight: 800; cursor: pointer; z-index: 100;
        }

        .tabs {
            display: flex; background: rgba(0,0,0,0.2);
            border-radius: 15px; padding: 5px; margin-bottom: 20px; margin-top: 40px;
        }

        .tab-btn {
            flex: 1; padding: 12px; border: none; background: transparent;
            color: var(--text-dim); font-weight: 600; cursor: pointer;
            border-radius: 10px; transition: 0.3s;
        }

        .tab-btn.active { background: var(--primary); color: var(--bg); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .glass-card {
            background: var(--card); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px; padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .label-sm {
            display: block; font-size: 0.75rem; font-weight: 600;
            color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase;
        }

        #valor_salario, .calc-display {
            width: 100%; background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.05);
            border-radius: 15px; padding: 15px; font-size: 2rem;
            color: var(--danger); text-align: center; font-weight: 800; outline: none;
            box-sizing: border-box;
        }

        #valor_salario::placeholder { font-size: 1.1rem; color: var(--text-dim); opacity: 0.5; font-weight: 400; }

        .total-box {
            background: linear-gradient(135deg, #0284c7, #2563eb);
            border-radius: 20px; padding: 20px; text-align: center; margin: 20px 0;
        }

        #total_val { font-size: 2.5rem; font-weight: 800; color: white; display: block; }

        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .calc-btn { padding: 20px; border-radius: 12px; border: none; background: rgba(255,255,255,0.05); color: white; font-size: 1.2rem; font-weight: 600; cursor: pointer; }
        .calc-btn.op { background: var(--primary); color: var(--bg); }

        .result-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .footer { text-align: center; padding: 30px; font-size: 0.8rem; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="container">
    <button class="exit-app-btn" onclick="sairApp()">SAIR</button>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('tributos')">Tributos</button>
        <button class="tab-btn" onclick="openTab('calculadora')">Calculadora</button>
    </div>

    <div id="tributos" class="tab-content active">
        <div class="glass-card">
            <span class="label-sm">Valor a Calcular</span>
            <input type="tel" id="valor_salario" placeholder="Digite o seu valor aqui" inputmode="numeric">

            <div class="total-box">
                <span class="label-sm" style="color: rgba(255,255,255,0.8)">Total de Tributos</span>
                <span id="total_val">R$ 0,00</span>
            </div>

            <div id="lista-tributos">
                <div class="result-row"><span>Primícia</span><b id="res-primicia">R$ 0,00</b></div>
                <div class="result-row"><span>Dízimo</span><b id="res-dizimo">R$ 0,00</b></div>
                <div class="result-row"><span>Socorro</span><b id="res-socorro">R$ 0,00</b></div>
                <div class="result-row"><span>Gratidão</span><b id="res-gratidao">R$ 0,00</b></div>
                <div class="result-row"><span>Semeadura</span><b id="res-semeadura">R$ 0,00</b></div>
                <div class="result-row"><span>Israel</span><b id="res-israel">R$ 0,00</b></div>
            </div>
        </div>
    </div>

    <div id="calculadora" class="tab-content">
        <div class="glass-card">
            <input type="text" id="calc-display" class="calc-display" readonly value="0">
            <div class="calc-grid">
                <button class="calc-btn op" onclick="clearCalc()">C</button>
                <button class="calc-btn op" onclick="press('/')">/</button>
                <button class="calc-btn op" onclick="press('*')">x</button>
                <button class="calc-btn op" onclick="backspace()">⌫</button>
                <button class="calc-btn" onclick="press('7')">7</button>
                <button class="calc-btn" onclick="press('8')">8</button>
                <button class="calc-btn" onclick="press('9')">9</button>
                <button class="calc-btn op" onclick="press('-')">-</button>
                <button class="calc-btn" onclick="press('4')">4</button>
                <button class="calc-btn" onclick="press('5')">5</button>
                <button class="calc-btn" onclick="press('6')">6</button>
                <button class="calc-btn op" onclick="press('+')">+</button>
                <button class="calc-btn" onclick="press('1')">1</button>
                <button class="calc-btn" onclick="press('2')">2</button>
                <button class="calc-btn" onclick="press('3')">3</button>
                <button class="calc-btn op" onclick="calculateResult()">=</button>
                <button class="calc-btn" style="grid-column: span 2" onclick="press('0')">0</button>
                <button class="calc-btn" onclick="press('.')">.</button>
            </div>
        </div>
    </div>

    <div class="footer">CREATED BY JADSON VIANA • 2026</div>
</div>

<script>
    // --- LÓGICA PWA ---
    const manifest = {
        "name": "Tributos Premium",
        "short_name": "Tributos",
        "start_url": ".",
        "display": "standalone",
        "background_color": "#0f172a",
        "theme_color": "#38bdf8",
        "icons": [{ "src": "icone.png", "sizes": "512x512", "type": "image/png" }]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    document.querySelector('#manifest-placeholder').setAttribute('href', URL.createObjectURL(blob));

    $(function() {
        const $valInput = $("#valor_salario");
        
        // Inicializa Máscara
        $valInput.maskMoney({symbol:'R$ ', thousands:'.', decimal:',', precision:0, allowZero: false});
        $valInput.val(''); 

        // Escuta TODAS as mudanças para evitar resíduos e atualizar em tempo real
        $valInput.on('keyup input propertychange paste blur', function() {
            calcularTributos();
        });
    });

    function openTab(tabName) {
        $('.tab-content, .tab-btn').removeClass('active');
        $('#' + tabName).addClass('active');
        $(`button[onclick="openTab('${tabName}')"]`).addClass('active');
    }

    function format(val) {
        return val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function calcularTributos() {
        let campo = $("#valor_salario").val();
        
        // ZERAMENTO ABSOLUTO: Se campo vazio ou só prefixo, limpa resíduos
        if (!campo || campo === "" || campo === "R$ ") {
            const zero = "R$ 0,00";
            $("#res-primicia, #res-dizimo, #res-socorro, #res-gratidao, #res-semeadura, #res-israel, #total_val").text(zero);
            return;
        }

        let raw = campo.replace(/[R$\.\s]/g, '').replace(',', '.');
        let valor = parseFloat(raw) || 0;

        if(valor <= 0) {
            const zero = "R$ 0,00";
            $("#res-primicia, #res-dizimo, #res-socorro, #res-gratidao, #res-semeadura, #res-israel, #total_val").text(zero);
            return;
        }

        // Cálculos Originais
        let p = Math.ceil(valor / 30);
        let d = Math.ceil((valor - p) * 0.10);
        let s = Math.ceil(valor * 0.02);
        let g = Math.ceil(valor * 0.0010);
        let sem = Math.ceil(valor * 0.0040);
        let isr = Math.ceil(valor * 0.01);
        let total = p + d + s + g + sem + isr;

        $("#res-primicia").text(format(p));
        $("#res-dizimo").text(format(d));
        $("#res-socorro").text(format(s));
        $("#res-gratidao").text(format(g));
        $("#res-semeadura").text(format(sem));
        $("#res-israel").text(format(isr));
        $("#total_val").text(format(total));
    }

    function sairApp() {
        if(confirm("Deseja fechar o aplicativo?")) {
            window.close();
            setTimeout(() => { window.location.href = "about:blank"; }, 100);
        }
    }

    // Calculadora Comum
    let calcExpression = "";
    function press(val) { calcExpression += val; $("#calc-display").val(calcExpression); }
    function clearCalc() { calcExpression = ""; $("#calc-display").val("0"); }
    function backspace() { calcExpression = calcExpression.slice(0, -1); $("#calc-display").val(calcExpression || "0"); }
    function calculateResult() {
        try { 
            let res = eval(calcExpression);
            calcExpression = res.toString();
            $("#calc-display").val(calcExpression); 
        } 
        catch { $("#calc-display").val("Erro"); calcExpression = ""; }
    }
</script>
</body>
</html>
