<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tributos & Cálculos Premium</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" id="manifest-placeholder">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-maskmoney/3.0.2/jquery.maskMoney.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #38bdf8;
            --bg-deep: #0f172a;
            --bg-light: #1e293b;
            --card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #fb7185;
            --success: #22c55e;
            --glow: rgba(56, 189, 248, 0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, var(--bg-light), var(--bg-deep));
            color: var(--text-main);
            display: flex; justify-content: center;
            overflow-x: hidden;
        }

        #overlay-verse {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; visibility: hidden; opacity: 0;
            transition: 0.4s ease;
        }
        #overlay-verse.show { visibility: visible; opacity: 1; }

        .popup-card {
            background: var(--primary); color: var(--bg-deep);
            width: 85%; max-width: 380px; padding: 40px 25px;
            border-radius: 32px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: scale(0.8); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #overlay-verse.show .popup-card { transform: scale(1); }

        .popup-text { font-size: 1.3rem; font-weight: 800; line-height: 1.4; margin-bottom: 30px; }

        .btn-amem {
            background: var(--bg-deep); color: white; border: none;
            padding: 18px; border-radius: 20px;
            font-weight: 800; font-size: 1.1rem; cursor: pointer;
            width: 100%; text-transform: uppercase;
        }

        .exit-app-btn {
            position: absolute; top: 15px; left: 15px;
            background: rgba(251, 113, 133, 0.1); border: 1px solid var(--danger);
            color: var(--danger); border-radius: 8px; padding: 5px 10px;
            font-size: 0.7rem; font-weight: 800; cursor: pointer; z-index: 100;
        }

        .container {
            width: 100%; max-width: 480px; padding: 20px;
            display: flex; flex-direction: column; min-height: 100vh;
            position: relative;
        }

        .tabs {
            display: flex; background: rgba(0,0,0,0.3);
            border-radius: 16px; padding: 5px; margin-bottom: 25px; margin-top: 40px;
        }

        .tab-btn {
            flex: 1; padding: 14px; border: none; background: transparent;
            color: var(--text-dim); font-weight: 600; cursor: pointer;
            border-radius: 12px; transition: 0.3s ease; font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--primary); color: var(--bg-deep);
            box-shadow: 0 0 15px var(--glow);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .glass-card {
            background: var(--card); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px; padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* NOVO LABEL */
        .label-sm {
            display: block;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        #valor_salario, .calc-display {
            width: 100%; background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 18px; font-size: 2.2rem;
            color: var(--danger); text-align: center; font-weight: 800;
            outline: none; box-sizing: border-box;
        }

        .total-display {
            background: linear-gradient(135deg, #0284c7 0%, #2563eb 100%);
            border-radius: 24px; padding: 20px; margin: 20px 0;
            text-align: center; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }

        #total_val { font-size: 2.5rem; font-weight: 800; color: white; }

        .result-card {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.4); padding: 15px 20px; border-radius: 18px;
            margin-bottom: 8px; border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .res-label { font-size: 0.8rem; font-weight: 600; color: var(--text-dim); }
        .res-val { color: #fff; font-size: 1.1rem; font-weight: 700; }

        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 20px; }

        .footer { margin-top: auto; text-align: center; padding: 40px 0 20px; }

        /* NOVO RODAPÉ */
        .creator-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .created-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1.5px;
        }

        .creator-main {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .creator-year {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .icon-coin {
            width: 24px;
            height: 24px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-deep);
            font-weight: 800;
            font-size: 0.75rem;
        }
    </style>
</head>

<body onclick="entrarFullScreen()">

<div class="container">

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('tributos')">Tributos</button>
        <button class="tab-btn" onclick="openTab('calculadora')">Calculadora</button>
    </div>

    <div id="tributos" class="tab-content active">
        <div class="glass-card">

            <span class="label-sm">Valor a Calcular</span>

            <input type="text" id="valor_salario" placeholder="R$ 0" onkeyup="calcularTributos()">

            <div class="total-display">
                <span id="total_val">R$ 0,00</span>
            </div>

        </div>
    </div>

    <div class="footer">
        <div class="creator-info">

            <div class="created-label">CREATED BY</div>

            <div class="creator-main">
                <div class="icon-coin">$</div>
                <div>JADSON VIANA</div>
            </div>

            <div class="creator-year">2026</div>

        </div>
    </div>

</div>

</body>
</html>
