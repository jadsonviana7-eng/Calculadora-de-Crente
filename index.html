<!doctype html>
<html lang="pt-BR">
<head>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tributos & Cálculos Premium</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" id="manifest-placeholder">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-maskmoney/3.0.2/jquery.maskMoney.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #38bdf8;
            --bg-deep: #0f172a;
            --bg-light: #1e293b;
            --card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #fb7185;
            --success: #22c55e;
            --glow: rgba(56, 189, 248, 0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, var(--bg-light), var(--bg-deep));
            color: var(--text-main);
            display: flex; justify-content: center;
            overflow-x: hidden;
        }

        /* Overlay do Versículo (Pop-up Inicial) */
        #overlay-verse {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; visibility: hidden; opacity: 0;
            transition: 0.4s ease;
        }
        #overlay-verse.show { visibility: visible; opacity: 1; }

        .popup-card {
            background: var(--primary); color: var(--bg-deep);
            width: 85%; max-width: 380px; padding: 40px 25px;
            border-radius: 32px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: scale(0.8); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #overlay-verse.show .popup-card { transform: scale(1); }
        .popup-text { font-size: 1.3rem; font-weight: 800; line-height: 1.4; margin-bottom: 30px; }
        
        .btn-amem {
            background: var(--bg-deep); color: white; border: none;
            padding: 18px; border-radius: 20px;
            font-weight: 800; font-size: 1.1rem; cursor: pointer;
            width: 100%; text-transform: uppercase;
        }

        /* Botão Sair */
        .exit-app-btn {
            position: absolute; 
            top: 15px; 
            right: 15px; /* Alterado de left para right */
            background: rgba(251, 113, 133, 0.1); 
            border: 1px solid var(--danger);
            color: var(--danger); 
            border-radius: 8px; 
            padding: 5px 12px;
            font-size: 0.7rem; 
            font-weight: 800; 
            cursor: pointer; 
            z-index: 100;
            text-transform: uppercase;
        }

        .container {
            width: 100%; max-width: 480px; padding: 20px;
            display: flex; flex-direction: column; min-height: 100vh;
            position: relative;
        }

        .tabs {
            display: flex; background: rgba(0,0,0,0.3);
            border-radius: 16px; padding: 5px; margin-bottom: 25px; margin-top: 40px;
        }

        .tab-btn {
            flex: 1; padding: 14px; border: none; background: transparent;
            color: var(--text-dim); font-weight: 600; cursor: pointer;
            border-radius: 12px; transition: 0.3s ease; font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--primary); color: var(--bg-deep);
            box-shadow: 0 0 15px var(--glow);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .glass-card {
            background: var(--card); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px; padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        #valor_salario, .calc-display {
            width: 100%; background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 18px; font-size: 2.2rem;
            color: var(--danger); text-align: center; font-weight: 800;
            outline: none; box-sizing: border-box;
        }

        .total-display {
            background: linear-gradient(135deg, #0284c7 0%, #2563eb 100%);
            border-radius: 24px; padding: 20px; margin: 20px 0;
            text-align: center; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }

        #total_val { font-size: 2.5rem; font-weight: 800; color: white; }

        .result-card {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.4); padding: 15px 20px; border-radius: 18px;
            margin-bottom: 8px; border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .res-label { font-size: 0.8rem; font-weight: 600; color: var(--text-dim); }
        .res-val { color: #fff; font-size: 1.1rem; font-weight: 700; }

        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 20px; }
        .calc-btn {
            padding: 20px 0; border-radius: 16px; border: none;
            background: rgba(255,255,255,0.06); color: white;
            font-size: 1.3rem; font-weight: 600; cursor: pointer;
        }
        .calc-btn.op { background: var(--primary); color: var(--bg-deep); }
        .calc-btn.eq { background: var(--success); color: white; }

        .footer { margin-top: auto; text-align: center; padding: 40px 0 20px; }
        .creator-info { font-size: 1rem; font-weight: 800; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .icon-coin { width: 24px; height: 24px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--bg-deep); font-weight: 800; font-size: 0.75rem; }
    </style>
</head>
<body onclick="entrarFullScreen()">

    <div id="overlay-verse">
        <div class="popup-card">
            <div id="popup-text" class="popup-text"></div>
            <button class="btn-amem" onclick="fecharPopup()">AMÉM</button>
        </div>
    </div>

    <div class="container">
        <button class="exit-app-btn" onclick="sairApp()">SAIR</button>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('tributos')">Tributos</button>
            <button class="tab-btn" onclick="openTab('calculadora')">Calculadora</button>
        </div>

        <div id="tributos" class="tab-content active">
            <div class="glass-card">
                <input type="text" id="valor_salario" placeholder="R$ 0" onkeyup="calcularTributos()">
                <div class="total-display">
                    <span id="total_val">R$ 0,00</span>
                </div>
                <div class="results-list">
                    <div class="result-card"><span class="res-label">PRIMÍCIA</span><span class="res-val" id="res-p">R$ 0,00</span></div>
                    <div class="result-card"><span class="res-label">DÍZIMO</span><span class="res-val" id="res-d">R$ 0,00</span></div>
                    <div class="result-card"><span class="res-label">SOCORRO</span><span class="res-val" id="res-s">R$ 0,00</span></div>
                    <div class="result-card"><span class="res-label">GRATIDÃO</span><span class="res-val" id="res-g">R$ 0,00</span></div>
                    <div class="result-card"><span class="res-label">SEMEADURA</span><span class="res-val" id="res-sem">R$ 0,00</span></div>
                    <div class="result-card"><span class="res-label">ISRAEL</span><span class="res-val" id="res-isr">R$ 0,00</span></div>
                </div>
            </div>
        </div>

        <div id="calculadora" class="tab-content">
            <div class="glass-card">
                <input type="text" id="calc-display" class="calc-display" readonly value="0">
                <div class="calc-grid">
                    <button class="calc-btn op" onclick="clearCalc()">C</button>
                    <button class="calc-btn op" onclick="press('/')">÷</button>
                    <button class="calc-btn op" onclick="press('*')">×</button>
                    <button class="calc-btn op" onclick="backspace()">⌫</button>
                    <button class="calc-btn" onclick="press('7')">7</button>
                    <button class="calc-btn" onclick="press('8')">8</button>
                    <button class="calc-btn" onclick="press('9')">9</button>
                    <button class="calc-btn op" onclick="press('-')">-</button>
                    <button class="calc-btn" onclick="press('4')">4</button>
                    <button class="calc-btn" onclick="press('5')">5</button>
                    <button class="calc-btn" onclick="press('6')">6</button>
                    <button class="calc-btn op" onclick="press('+')">+</button>
                    <button class="calc-btn" onclick="press('1')">1</button>
                    <button class="calc-btn" onclick="press('2')">2</button>
                    <button class="calc-btn" onclick="press('3')">3</button>
                    <button class="calc-btn eq" onclick="calculateResult()">=</button>
                    <button class="calc-btn" style="grid-column: span 2" onclick="press('0')">0</button>
                    <button class="calc-btn" onclick="press('.')">,</button>
                    <button class="calc-btn op" onclick="press('%')">%</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="creator-info">
                <div class="icon-coin">$</div> JADSON VIANA
            </div>
        </div>
    </div>

    <script>
        // --- LÓGICA PWA (AUTO-INSTALÁVEL) ---
        const manifest = {
            "name": "Tributos Premium",
            "short_name": "Tributos",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0f172a",
            "theme_color": "#38bdf8",
            "icons": [{ "src": "icone.png", "sizes": "512x512", "type": "image/png" }]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        document.querySelector('#manifest-placeholder').setAttribute('href', manifestURL);

        // --- LÓGICA DO APP ---
        const versiculos = [
            '"Honra ao Senhor com os teus bens e com as primícias de toda a tua renda." (Prov. 3:9)',
            '"Deus ama quem dá com alegria." (2 Cor. 9:7)',
            '"Buscai primeiro o Reino de Deus e a sua justiça." (Mat. 6:33)',
            '"Trazei todos os dízimos à casa do tesouro." (Mal. 3:10)'
        ];

        $(function() {
            $("#valor_salario").maskMoney({symbol:'R$ ', thousands:'.', decimal:',', precision:0});
            let rand = Math.floor(Math.random() * versiculos.length);
            $("#popup-text").text(versiculos[rand]);
            setTimeout(() => { $("#overlay-verse").addClass("show"); }, 500);
        });

        function fecharPopup() { 
            $("#overlay-verse").removeClass("show"); 
            entrarFullScreen();
        }

        function entrarFullScreen() {
            let el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }

       function sairApp() {
        if(confirm("Deseja fechar o aplicativo?")) {
        // Tenta fechar a janela/aba (Funciona bem em apps instalados)
        window.close();
        
        // Caso o comando acima seja bloqueado pelo navegador, 
        // ele limpa o histórico e redireciona para sair da visão do app
        setTimeout(function() {
        window.location.href = "about:blank";
                }, 100);
            }
        }

        function openTab(name) {
            $('.tab-content, .tab-btn').removeClass('active');
            $('#' + name).addClass('active');
            $(`button[onclick="openTab('${name}')"]`).addClass('active');
        }

        function calcularTributos() {
            let raw = $("#valor_salario").val().replace(/[R$\.\s]/g, '').replace(',', '.');
            let v = parseFloat(raw) || 0;
            if(v === 0) return;
            let p = Math.ceil(v / 30), d = Math.ceil((v - p) * 0.10), s = Math.ceil(v * 0.02),
                g = Math.ceil(v * 0.0010), sem = Math.ceil(v * 0.0040), isr = Math.ceil(v * 0.01);
            let total = p + d + s + g + sem + isr;
            const fmt = (val) => val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            $("#res-p").text(fmt(p)); $("#res-d").text(fmt(d)); $("#res-s").text(fmt(s));
            $("#res-g").text(fmt(g)); $("#res-sem").text(fmt(sem)); $("#res-isr").text(fmt(isr));
            $("#total_val").text(fmt(total));
        }

        let currentExp = "";
        function press(val) { currentExp += val; $("#calc-display").val(currentExp); }
        function clearCalc() { currentExp = ""; $("#calc-display").val("0"); }
        function backspace() { currentExp = currentExp.slice(0, -1); $("#calc-display").val(currentExp || "0"); }
        function calculateResult() {
            try { currentExp = eval(currentExp.replace('%', '/100')).toString(); $("#calc-display").val(currentExp); } 
            catch { $("#calc-display").val("Erro"); }
        }
    </script>
</body>
</html>
